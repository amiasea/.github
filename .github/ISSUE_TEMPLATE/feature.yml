name: Feature
description: Define a new capability or change
title: "[Feature]: "
labels:
  - feature

body:
  - type: input
    id: feature_slug
    attributes:
      label: Feature Slug
      description: >
        Machine-friendly identifier used for automation.
        Use lowercase kebab-case only.
        Example: oidc-authentication
      placeholder: oidc-authentication
    validations:
      required: true

  - type: input
    id: feature_name
    attributes:
      label: Feature Name
      description: Human-readable name for this capability.
      placeholder: OIDC Authentication
    validations:
      required: true

  - type: textarea
    id: intent
    attributes:
      label: Intent
      description: >
        Describe the capability being introduced and the outcome it enables.
      placeholder: >
        Enable workload identity authentication so automation does not require
        long-lived credentials.
    validations:
      required: true

  - type: markdown
    attributes:
      value: |
        ---

        ## Solution Story Evidence

        <!-- solution-story-managed -->

        Pending automation.

        <!-- end solution-story-managed -->