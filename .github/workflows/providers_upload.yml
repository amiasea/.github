name: Central Provider Upload

on:
  workflow_call:
    inputs:
      azure_client_id:
        required: false
        type: string
      azure_tenant_id:
        required: false
        type: string
      azure_subscription_id:
        required: false
        type: string
      azure_key_name:
        required: true
        type: string
      hcp_provider_name:
        required: true
        type: string

jobs:
  upload-provider:
    runs-on: ubuntu-latest
    permissions:
      id-token: write
      contents: write
    env:
      TF_ORG: "amiasea"

    steps:
      - name: Checkout Code
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Structural Validation
        run: |
          echo "::group::🔍 Structural Validation"
          if [[ ! -f "README.md" ]]; then
            echo "❌ CRITICAL ERROR: README.md is required."
            exit 1
          fi
          echo "✅ README.md verified."
          echo "::endgroup::"

      - name: Set up Go
        uses: actions/setup-go@v5
        with:
          go-version: '1.22'
          cache: true

      - name: Go Mod Tidy
        run: |
          echo "::group::📦 Go Modules"
          go mod tidy
          echo "::endgroup::"

      - name: Az CLI Login
        uses: azure/login@v3 # Upgraded to v3 to natively support modern runner hosts
        with:
          client-id: ${{ inputs.azure_client_id || vars.AZURE_CLIENT_ID }}
          tenant-id: ${{ inputs.azure_tenant_id || vars.AZURE_TENANT_ID }}
          subscription-id: ${{ inputs.azure_subscription_id || vars.AZURE_SUBSCRIPTION_ID }}

      - name: Fetch HCP Terraform Token
        id: auth
        run: |
          echo "::group::🔑 Fetch Token"
          VAULT_NAME=$(echo "${{ vars.TF_TOKEN_VERSIONLESS_ID }}" | cut -d'/' -f3 | cut -d'.' -f1)
          echo "INFO: Resolved Key Vault Name -> $VAULT_NAME"
          
          RAW_TOKEN=$(az keyvault secret show --id "${{ vars.TF_TOKEN_VERSIONLESS_ID }}" --query value -o tsv)
          if [[ -z "$RAW_TOKEN" ]]; then
            echo "❌ ERROR: Token retrieval failed from Key Vault."
            exit 1
          fi
          echo "::add-mask::$RAW_TOKEN"
          echo "token=$RAW_TOKEN" >> $GITHUB_OUTPUT
          echo "✅ HCP Token successfully retrieved and masked."
          echo "::endgroup::"

      - name: Calculate Next Version
        id: versioning
        env:
          TF_TOKEN: ${{ steps.auth.outputs.token }}
        run: |
          echo "::group::🔢 Calculate Version"
          PROVIDER_NAME="${{ inputs.hcp_provider_name }}"
          
          API_URL="https://app.terraform.io/api/v2/organizations/${TF_ORG}/registry-providers/private/${TF_ORG}/${PROVIDER_NAME}"
          echo "INFO: Fetching versions from -> $API_URL"
          
          RESPONSE=$(curl -s -w "\n[HTTP STATUS]: %{http_code}\n" -H "Authorization: Bearer $TF_TOKEN" "$API_URL")
          HTTP_STATUS=$(echo "$RESPONSE" | grep "\[HTTP STATUS\]" | awk '{print $3}')
          echo "DEBUG: API HTTP Status Code -> $HTTP_STATUS"
          
          CLEAN_JSON=$(echo "$RESPONSE" | sed '/\[HTTP STATUS\]/d')
          LATEST=$(echo "$CLEAN_JSON" | jq -r 'if .data.attributes."version-statuses" != null and (.data.attributes."version-statuses" | length > 0) then .data.attributes."version-statuses" | map(.version) | sort_by(split(".") | map(tonumber)) | last else "0.0.0" end' 2>/dev/null || echo "0.0.0")
          
          if [[ "$LATEST" == "null" || -z "$LATEST" ]]; then LATEST="0.0.0"; fi
          echo "INFO: Latest PMR Version discovered -> $LATEST"
          
          IFS='.' read -r MAJOR MINOR PATCH <<< "$LATEST"
          MAJOR=${MAJOR:-0}; MINOR=${MINOR:-0}; PATCH=${PATCH:-0}
          PR_TITLE="${{ github.event.pull_request.title || 'chore: release' }}"
          
          if [[ "$PR_TITLE" == *"feat"* ]]; then
            NEXT_VERSION="${MAJOR}.$((MINOR + 1)).0"
          elif [[ "$PR_TITLE" == *"fix"* ]]; then
            NEXT_VERSION="${MAJOR}.${MINOR}.$((PATCH + 1))"
          else
            NEXT_VERSION="$((MAJOR + 1)).0.0"
          fi
          
          echo "next_version=$NEXT_VERSION" >> $GITHUB_OUTPUT
          echo "✅ Target Release Version calculated -> $NEXT_VERSION"
          echo "::endgroup::"

      - name: Resolve and Sync Permanent GPG Key Identity
        id: gpg_lifecycle
        env:
          TF_TOKEN: ${{ steps.auth.outputs.token }}
          KEY_NAME: "amiasea-${{ inputs.hcp_provider_name }}"
          SECRET_NAME: "${{ inputs.hcp_provider_name }}-gpg-private"
        run: |
          echo "::group::🔐 Sync GPG Key"
          VAULT_NAME=$(echo "${{ vars.TF_TOKEN_VERSIONLESS_ID }}" | cut -d'/' -f3 | cut -d'.' -f1)
          
          GPG_URL="https://app.terraform.io/api/registry/private/v2/gpg-keys"
          FETCH_URL="${GPG_URL}?filter%5Bnamespace%5D=${TF_ORG}"
          echo "INFO: Scanning HCP Registry via -> $FETCH_URL"
          
          GPG_LIST_RESPONSE=$(curl -s -w "\n[HTTP STATUS]: %{http_code}\n" -H "Authorization: Bearer $TF_TOKEN" "$FETCH_URL")
          CLEAN_GPG_JSON=$(echo "$GPG_LIST_RESPONSE" | sed '/\[HTTP STATUS\]/d')
          
          EXISTING_KEY_ID=$(echo "$CLEAN_GPG_JSON" | jq -r --arg org "$TF_ORG" 'if .data != null then .data[] | select(.attributes.namespace == $org) | .id else empty end' | head -n 1)
          
          if [[ -n "$EXISTING_KEY_ID" && "$EXISTING_KEY_ID" != "null" ]]; then
            echo "✅ MATCH FOUND: Re-using existing HCP GPG Key ID -> $EXISTING_KEY_ID"
            echo "gpg_key_id=$EXISTING_KEY_ID" >> $GITHUB_OUTPUT
          else
            echo "⚠️ KEY NOT FOUND IN HCP: Querying Azure Key Vault for backup secret: $SECRET_NAME"
            AZ_SECRET=$(az keyvault secret show --vault-name "$VAULT_NAME" --name "$SECRET_NAME" --query "value" -o tsv 2>/dev/null || true)
            
            if [[ -n "$AZ_SECRET" ]]; then
              echo "✅ BACKUP FOUND: Restoring private key from Azure Secret Store..."
              echo "$AZ_SECRET" | gpg --batch --import
              LOCAL_KEY_ID=$(gpg --list-secret-keys --with-colons | grep '^sec' | cut -d':' -f5 | head -n1)
              PUBLIC_KEY_ARMOR=$(gpg --armor --export "$LOCAL_KEY_ID")
            else
              echo "⚡ TOTAL NEW PROVIDER: Generating isolated keypair..."
              printf 'Key-Type: RSA\nKey-Length: 4096\nKey-Usage: sign\nName-Real: Automated Provider Signing\nName-Email: devops+aviator@amiasea.com\nExpire-Date: 0\n%%no-protection\n%%commit\n' > gpg-batch.conf
              gpg --batch --generate-key gpg-batch.conf
              
              LOCAL_KEY_ID=$(gpg --list-secret-keys --with-colons | grep '^sec' | cut -d':' -f5 | head -n1)
              PUBLIC_KEY_ARMOR=$(gpg --armor --export "$LOCAL_KEY_ID")
              PRIVATE_KEY_ARMOR=$(gpg --armor --export-secret-keys "$LOCAL_KEY_ID")
              
              echo "Securing private key backup to Azure Key Vault..."
              az keyvault secret set --vault-name "$VAULT_NAME" --name "$SECRET_NAME" --value "$PRIVATE_KEY_ARMOR" > /dev/null
              echo "✅ Backup finalized in Key Vault."
            fi
            
            echo "Registering armor public block inside HCP Private Registry via -> $GPG_URL"
            HCP_PAYLOAD=$(jq -n \
              --arg org "$TF_ORG" \
              --arg armor "$PUBLIC_KEY_ARMOR" \
              '{data: {type: "gpg-keys", attributes: {namespace: $org, "ascii-armor": $armor}}}')
              
            REG_RESPONSE=$(curl -s -w "\n[HTTP STATUS]: %{http_code}\n" -X POST \
              -H "Authorization: Bearer $TF_TOKEN" \
              -H "Content-Type: application/vnd.api+json" \
              -d "$HCP_PAYLOAD" "$GPG_URL")
              
            CLEAN_REG_JSON=$(echo "$REG_RESPONSE" | sed '/\[HTTP STATUS\]/d')
            NEW_GPG_ID=$(echo "$CLEAN_REG_JSON" | jq -r '.data.id // empty')
            
            if [[ -z "$NEW_GPG_ID" || "$NEW_GPG_ID" == "null" ]]; then
              echo "❌ ERROR: GPG registration failed on HCP API. Response details below:"
              echo "$CLEAN_REG_JSON"
              exit 1
            fi
            
            echo "✅ Keypair generated and synced. HCP GPG Key ID -> $NEW_GPG_ID"
            echo "gpg_key_id=$NEW_GPG_ID" >> $GITHUB_OUTPUT
          fi
          echo "::endgroup::"

      # STEP 1 OF PART 2: Hydrate keyring with your key ID before running compilation
      - name: 🔐 Prepare Local GPG Keyring for GoReleaser
        id: gpg_prep
        run: |
          echo "::group::🔐 Keyring Hydration"
          VAULT_NAME=$(echo "${{ vars.TF_TOKEN_VERSIONLESS_ID }}" | cut -d'/' -f3 | cut -d'.' -f1)
          SECRET_NAME="${{ inputs.hcp_provider_name }}-gpg-private"
          
          echo "INFO: Downloading private signing key from Vault..."
          AZ_SECRET=$(az keyvault secret show --vault-name "$VAULT_NAME" --name "$SECRET_NAME" --query "value" -o tsv 2>/dev/null || true)
          
          if [[ -z "$AZ_SECRET" ]]; then
            echo "❌ CRITICAL ERROR: Could not retrieve private key from Azure Key Vault."
            exit 1
          fi
          
          echo "$AZ_SECRET" | gpg --batch --import
          LOCAL_SIGN_ID=$(gpg --list-secret-keys --with-colons | grep '^sec' | cut -d':' -f5 | head -n 1)
          echo "gpg_key_id=$LOCAL_SIGN_ID" >> $GITHUB_OUTPUT
          
          echo "✅ Local keyring hydrated. Ready for native signing with Key ID: $LOCAL_SIGN_ID"
          echo "::endgroup::"

      - name: Run GoReleaser (Compiles and Signs Natively)
        uses: goreleaser/goreleaser-action@v6
        with:
          distribution: goreleaser
          version: latest
          args: release --clean --snapshot --skip=publish --parallelism 2
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          HCP_PROVIDER_NAME: ${{ inputs.hcp_provider_name }}
          NEXT_VERSION_TAG: ${{ steps.versioning.outputs.next_version }}
          GPG_KEY_ID: ${{ steps.gpg_prep.outputs.gpg_key_id }}

      # STEP 3 OF PART 2: Publish to HCP Private Registry
      - name: Publish to HCP Terraform Private Registry
        env:
          TF_TOKEN: ${{ steps.auth.outputs.token }}
          NEXT_VER: ${{ steps.versioning.outputs.next_version }}
          PROVIDER_NAME: ${{ inputs.hcp_provider_name }}
          TARGET_GPG_ID: ${{ steps.gpg_lifecycle.outputs.gpg_key_id }}
        run: |
          echo "::group::🚀 PMR Asset Publication"
          
          BASE_URL="https://app.terraform.io/api/v2/organizations/${TF_ORG}/registry-providers/private/${TF_ORG}/${PROVIDER_NAME}"
          echo "INFO: Reserving version block at: $BASE_URL/versions"
          
          VERSION_RESPONSE=$(curl -s -w "\n[HTTP STATUS]: %{http_code}\n" -X POST \
            -H "Authorization: Bearer $TF_TOKEN" \
            -H "Content-Type: application/vnd.api+json" \
            -d "{\"data\":{\"type\":\"registry-provider-versions\",\"attributes\":{\"version\":\"$NEXT_VER\",\"key-id\":\"$TARGET_GPG_ID\",\"protocols\":[\"5.0\",\"6.0\"]}}}" \
            "$BASE_URL/versions")
            
          CLEAN_VER_JSON=$(echo "$VERSION_RESPONSE" | sed '/\[HTTP STATUS\]/d')
          SHASUMS_URL=$(echo "$CLEAN_VER_JSON" | jq -r '.data.links["shasums-upload"] // empty')
          SHASUMS_SIG_URL=$(echo "$CLEAN_VER_JSON" | jq -r '.data.links["shasums-sig-upload"] // empty')
          
          if [[ -z "$SHASUMS_URL" || -z "$SHASUMS_SIG_URL" ]]; then
            echo "❌ ERROR: Failed to acquire secure binary upload allocation slots from HCP API. Details below:"
            echo "$CLEAN_VER_JSON"
            exit 1
          fi
          
          echo "Uploading core hash files..."
          curl -s -X PUT --data-binary @dist/terraform-provider-${PROVIDER_NAME}_${NEXT_VER}_SHA256SUMS "$SHASUMS_URL"
          curl -s -X PUT --data-binary @dist/terraform-provider-${PROVIDER_NAME}_${NEXT_VER}_SHA256SUMS.sig "$SHASUMS_SIG_URL"
          
          for platform in linux_amd64 darwin_arm64 windows_amd64; do
            OS=${platform%%_*}
            ARCH=${platform#*_}
            BINARY="dist/terraform-provider-${PROVIDER_NAME}_${NEXT_VER}_${OS}_${ARCH}.zip"
            
            if [[ -f "$BINARY" ]]; then
              echo "Allocating upload slot for architectural variant -> ${OS}/${ARCH}"
              PLATFORM_RESPONSE=$(curl -s -X POST \
                -H "Authorization: Bearer $TF_TOKEN" \
                -H "Content-Type: application/vnd.api+json" \
                -d "{\"data\":{\"type\":\"registry-provider-version-platforms\",\"attributes\":{\"os\":\"$OS\",\"arch\":\"$ARCH\"}}}" \
                "$BASE_URL/versions/$NEXT_VER/platforms")
                
              CLEAN_PLAT_JSON=$(echo "$PLATFORM_RESPONSE" | sed '/\[PLATFORM REG STATUS\]/d')
              UPLOAD_URL=$(echo "$CLEAN_PLAT_JSON" | jq -r '.data.links["provider-binary-upload"] // empty')
              
              if [[ -n "$UPLOAD_URL" && "$UPLOAD_URL" != "null" ]]; then
                echo "Uploading zip artifact binary to cloud storage..."
                curl -s -X PUT --data-binary @"$BINARY" "$UPLOAD_URL"
              fi
            fi
          done
          
          echo "🎉 Publication cycle completed successfully!"
          echo "::endgroup::"
