name: Reusable App Image Build

on:
  workflow_call:
    inputs:
      dockerfile_path:
        description: 'The path to the Dockerfile relative to the repository root'
        required: false
        type: string
        default: 'Dockerfile'
    outputs:
      image_tag:
        description: "The generated short-sha image tag"
        value: ${{ jobs.build-and-push.outputs.short_sha }}

  workflow_dispatch:

jobs:
  build-and-push:
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write # Required to push images to GHCR
    outputs:
      short_sha: ${{ steps.meta.outputs.SHORT_SHA }}

    steps:
    - name: Checkout Code
      uses: actions/checkout@v4

    - name: Set up Docker Buildx
      uses: docker/setup-buildx-action@v3

    # Authenticates natively to GHCR using the workflow run's security token
    - name: Log in to GitHub Container Registry (GHCR)
      uses: docker/login-action@v3
      with:
        registry: ghcr.io
        username: ${{ github.actor }}
        password: ${{ secrets.GITHUB_TOKEN }}

    - name: Generate Dynamic Image Meta
      id: meta
      shell: bash
      run: |
        REPO_NAME=$(echo "${{ github.repository }}" | cut -d'/' -f2)
        SHORT_SHA=$(echo "${{ github.sha }}" | cut -c1-7)
        
        echo "REPO_NAME=$REPO_NAME" >> $GITHUB_ENV
        echo "SHORT_SHA=$SHORT_SHA" >> $GITHUB_ENV
        echo "SHORT_SHA=$SHORT_SHA" >> $GITHUB_OUTPUT

    - name: Build and Push Docker Image
      uses: docker/build-push-action@v5
      with:
        context: .
        file: ${{ inputs.dockerfile_path }}
        push: true
        # Clean, explicit targets pointing to your dedicated GHCR namespace
        tags: |
          ghcr.io/amiasea/${{ env.REPO_NAME }}:${{ env.SHORT_SHA }}
          ghcr.io/amiasea/${{ env.REPO_NAME }}:latest
        cache-from: type=gha
        cache-to: type=gha,mode=max
