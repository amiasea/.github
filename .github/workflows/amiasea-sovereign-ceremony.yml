name: "Amiasea: Sovereign Bootstrap (First Manifestation)"

on:
  workflow_dispatch:
    inputs:
      tenant_id: { required: true }
      subscription_id: { required: true }
      uami_write_client_id: { required: true } # The Write UAMI Client ID
      uami_read_client_id: { required: true } # The Read UAMI Client ID
      uami_read_id: { required: true } # The Read UAMI ID
      uami_read_principal_id: { required: true } # The Read UAMI Principal ID (for role assignment)
      uami_write_principal_id: { required: true } # The Write UAMI Principal ID (for role assignment)
      tfe_token: { required: true } # Terraform Cloud token with permissions to the sovereign workspace
      private_key_pem: { required: true }
      ghcr_pat: { required: true }
      resource_group_name:
        required: true
        default: "rg-amiasea"
      location:
        required: true
        default: "centralus"

permissions:
  id-token: write # Required for both Azure and HCP OIDC handshakes
  contents: read

jobs:
  bootstrap:
    runs-on: ubuntu-latest
    env:
      TF_IN_AUTOMATION: true # Signals Terraform to use non-interactive output mode
      TF_TOKEN_app_terraform_io: ${{ inputs.tfe_token }}
    steps:
      - uses: actions/checkout@v4

      - uses: hashicorp/setup-terraform@v3
        with:
          terraform_version: "1.14.6"
          terraform_wrapper: false

      - name: Authenticate to Azure (OIDC)
        uses: azure/login@v2
        with:
          # Consumes values generated by the Sovereign step
          client-id: ${{ inputs.uami_write_client_id }}
          tenant-id: ${{ inputs.tenant_id }}
          subscription-id: ${{ inputs.subscription_id }}

      - name: Authority
        id: authority
        working-directory: ./terraform/authority
        env:
          TF_VAR_resource_group_name: ${{ inputs.resource_group_name }}
          TF_VAR_location: ${{ inputs.location }}
          TF_VAR_uami_read_principal_id: ${{ inputs.uami_read_principal_id }}
          TF_VAR_uami_write_principal_id: ${{ inputs.uami_write_principal_id }}
          TF_VAR_tenant_id: ${{ inputs.tenant_id }}
        run: |
          terraform init
          terraform apply -auto-approve

      - name: Set GHCR PAT to Vault
        run: |
          az keyvault secret set \
            --vault-name kv-amiasea \
            --name ghcr-pat \
            --value "${{ inputs.ghcr_pat }}"

      - name: Identity
        working-directory: ./terraform/identity
        run: |
          terraform init
          terraform apply -auto-approve

      - name: Runtime
        id: runtime
        working-directory: ./terraform/runtime
        env:
          TF_VAR_resource_group_name: ${{ inputs.resource_group_name }}
          TF_VAR_location: ${{ inputs.location }}
          TF_VAR_uami_read_id: ${{ inputs.uami_read_id }}
          TF_VAR_uami_read_client_id: ${{ inputs.uami_read_client_id }}
        run: |
          terraform init
          terraform apply -auto-approve