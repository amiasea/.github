name: "Amiasea: Sovereign Bootstrap (First Manifestation)"

on:
  workflow_dispatch:
    inputs:
      TFE_TOKEN: { required: true }
      GHCR_PAT: { required: true }

permissions:
  id-token: write
  contents: read

jobs:
  bootstrap:
    runs-on: ubuntu-latest
    env:
      TF_IN_AUTOMATION: true
      TF_TOKEN_app_terraform_io: ${{ inputs.TFE_TOKEN }}

      # Sovereign facts from GitHub Variables
      TF_VAR_tenant_id: ${{ vars.TENANT_ID }}
      TF_VAR_subscription_id: ${{ vars.SUBSCRIPTION_ID }}
      TF_VAR_resource_group_name: ${{ vars.RESOURCE_GROUP_NAME }}
      TF_VAR_location: ${{ vars.LOCATION }}
      TF_VAR_key_vault_name: ${{ vars.KEY_VAULT_NAME }}
      TF_VAR_uami_read_client_id: ${{ vars.UAMI_READ_CLIENT_ID }}
      TF_VAR_uami_read_principal_id: ${{ vars.UAMI_READ_PRINCIPAL_ID }}
      TF_VAR_uami_write_client_id: ${{ vars.UAMI_WRITE_CLIENT_ID }}
      TF_VAR_uami_write_principal_id: ${{ vars.UAMI_WRITE_PRINCIPAL_ID }}

    steps:
      - uses: actions/checkout@v4

      - uses: hashicorp/setup-terraform@v3
        with:
          terraform_version: "1.14.6"
          terraform_wrapper: false

      - name: Authenticate to Azure (OIDC)
        uses: azure/login@v2
        with:
          client-id: ${{ vars.UAMI_WRITE_CLIENT_ID }}
          tenant-id: ${{ vars.TENANT_ID }}
          subscription-id: ${{ vars.SUBSCRIPTION_ID }}

      - name: Authority
        working-directory: ./terraform/authority
        run: |
          terraform init
          terraform apply -auto-approve

      - name: Set GHCR PAT to Vault
        run: |
          az keyvault secret set \
            --vault-name kv-amiasea \
            --name ghcr-pat \
            --value "${{ inputs.ghcr_pat }}"

      - name: Identity
        working-directory: ./terraform/identity
        run: |
          terraform init
          terraform apply -auto-approve

      # 1. Authenticate with the READ principal to fetch the key
      - name: Azure Login (Read-Only)
        uses: azure/login@v2
        with:
          client-id: ${{ vars.UAMI_READ_CLIENT_ID }}
          tenant-id: ${{ vars.TENANT_ID }}
          subscription-id: ${{ vars.SUBSCRIPTION_ID }}

      - name: Sovereign Identity Signing (Key Vault)
        id: app-token
        run: |
          set -euo pipefail
          IFS=$'\n\t'

          # 1. timestamps
          NOW=$(date +%s)
          IAT=$NOW
          EXP=$((NOW + 600))

          # 2. header & payload (base64url)
          HEADER=$(echo -n '{"alg":"RS256","typ":"JWT"}' | openssl base64 -A | tr '+/' '-_' | tr -d '=')
          PAYLOAD=$(printf '{"iat":%s,"exp":%s,"iss":"%s"}' "$IAT" "$EXP" "${{ vars.AVIATOR_GH_APP_ID }}" | openssl base64 -A | tr '+/' '-_' | tr -d '=')
          RAW_JWT="${HEADER}.${PAYLOAD}"

          # 3. digest (raw SHA256, base64)
          DIGEST=$(echo -n "$RAW_JWT" | openssl dgst -sha256 -binary | openssl base64 -A)

          # 4. sign via Key Vault
          SIGNATURE_BASE64=$(az keyvault key sign \
            --vault-name "${{ vars.KEY_VAULT_NAME }}" \
            --name "${{ vars.AVIATOR_PRIVATE_KEY_NAME }}" \
            --algorithm RS256 \
            --digest "$DIGEST" \
            --query result -o tsv)

          SIGNATURE=$(echo -n "$SIGNATURE_BASE64" | tr '+/' '-_' | tr -d '=')
          JWT="${RAW_JWT}.${SIGNATURE}"

          # 5. Request installations (use correct endpoint)
          INSTALLATIONS_URL="https://api.github.com/app/installations"
          RESPONSE=$(curl -sS -w "\n%{http_code}" -H "Authorization: Bearer $JWT" -H "Accept: application/vnd.github+json" "$INSTALLATIONS_URL")
          HTTP_STATUS=$(echo "$RESPONSE" | tail -n1)
          BODY=$(echo "$RESPONSE" | sed '$d')

          if [ "$HTTP_STATUS" -ne 200 ]; then
            echo "::error::GitHub rejected the JWT. Status: $HTTP_STATUS Body: $BODY"
            exit 1
          fi

          INSTALL_ID=$(echo "$BODY" | jq -r --arg owner "${{ github.repository_owner }}" 'map(select(.account.login==$owner)) | .[0].id // empty')
          if [ -z "$INSTALL_ID" ]; then
            echo "::error::Could not find App Installation for ${{ github.repository_owner }}. Body: $BODY"
            exit 1
          fi

          # 6. Exchange for access token
          TOKEN_RESPONSE=$(curl -sS -X POST -H "Authorization: Bearer $JWT" -H "Accept: application/vnd.github+json" "https://api.github.com/app/installations/$INSTALL_ID/access_tokens")
          TOKEN=$(echo "$TOKEN_RESPONSE" | jq -r '.token // empty')
          if [ -z "$TOKEN" ]; then
            echo "::error::Token minting failed. Response: $TOKEN_RESPONSE"
            exit 1
          fi

          # 7. Mask and export
          echo "::add-mask::$TOKEN"
          echo "token=$TOKEN" >> $GITHUB_OUTPUT


      - name: Provision TFE_TOKEN (State-Free)
        env:
          GH_TOKEN: ${{ steps.app-token.outputs.token }}
        run: |
          # Push the secret directly to the GitHub Org Store
          gh secret set TFE_TOKEN \
            --org "${{ github.repository_owner }}" \
            --visibility private \
            --body "${{ inputs.TFE_TOKEN }}"
