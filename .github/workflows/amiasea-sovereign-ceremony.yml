name: "Amiasea: Sovereign Bootstrap (First Manifestation)"

on:
  workflow_dispatch:
    inputs:
      tenant_id: { required: true }
      subscription_id: { required: true }
      client_id: { required: true } # The Provisioner UAMI Client ID
      tfe_token: { required: true } # Terraform Cloud token with permissions to the sovereign workspace
      private_key_pem: { required: true }
      arm_access_token: { required: true }
      resource_group_name:
        required: true
        default: "rg-amiasea"
      location:
        required: true
        default: "centralus"

permissions:
  id-token: write # Required for both Azure and HCP OIDC handshakes
  contents: read

jobs:
  bootstrap:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: hashicorp/setup-terraform@v3
        with:
          terraform_version: "1.14.6"
          terraform_wrapper: false

      - name: Sovereign
        id: sovereign_step
        working-directory: ./terraform/sovereign
        env:
          TFE_TOKEN: ${{ inputs.tfe_token }}
          # Injects the token directly for the AzureRM provider
          ARM_ACCESS_TOKEN: ${{ inputs.arm_access_token }}
        run: |
          terraform init
          terraform apply -auto-approve
          
          # Map Terraform outputs to GitHub Step Outputs
          echo "tenant_id=$(terraform output -raw tenant_id)" >> $GITHUB_OUTPUT
          echo "subscription_id=$(terraform output -raw subscription_id)" >> $GITHUB_OUTPUT
          echo "client_id=$(terraform output -raw uami_write_client_id)" >> $GITHUB_OUTPUT

      # --- EXECUTION PHASE ---

      - name: Authenticate to Azure (OIDC)
        uses: azure/login@v2
        with:
          # Consumes values generated by the Sovereign step
          client-id: ${{ steps.sovereign_step.outputs.client_id }}
          tenant-id: ${{ steps.sovereign_step.outputs.tenant_id }}
          subscription-id: ${{ steps.sovereign_step.outputs.subscription_id }}

      - name: Orchestration
        working-directory: ./terraform/orchestration
        env:
          # Only this step consumes the HCP token for the TFE provider
          TFE_TOKEN: ${{ inputs.tfe_token }}
        run: |
          terraform init
          terraform apply -auto-approve

