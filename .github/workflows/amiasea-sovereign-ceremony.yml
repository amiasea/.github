name: "Amiasea: Sovereign Bootstrap (First Manifestation)"

on:
  workflow_dispatch:
    inputs:
      TFE_TOKEN: { required: true }
      GHCR_PAT: { required: true }

permissions:
  id-token: write
  contents: read

jobs:
  bootstrap:
    runs-on: ubuntu-latest
    env:
      TF_IN_AUTOMATION: true
      TF_TOKEN_app_terraform_io: ${{ inputs.TFE_TOKEN }}

      # Sovereign facts from GitHub Variables
      TF_VAR_tenant_id: ${{ vars.TENANT_ID }}
      TF_VAR_subscription_id: ${{ vars.SUBSCRIPTION_ID }}
      TF_VAR_resource_group_name: ${{ vars.RESOURCE_GROUP_NAME }}
      TF_VAR_location: ${{ vars.LOCATION }}
      TF_VAR_key_vault_name: ${{ vars.KEY_VAULT_NAME }}
      TF_VAR_uami_read_client_id: ${{ vars.UAMI_READ_CLIENT_ID }}
      TF_VAR_uami_read_principal_id: ${{ vars.UAMI_READ_PRINCIPAL_ID }}
      TF_VAR_uami_write_client_id: ${{ vars.UAMI_WRITE_CLIENT_ID }}
      TF_VAR_uami_write_principal_id: ${{ vars.UAMI_WRITE_PRINCIPAL_ID }}
      TF_VAR_amiasea_db_admins_group_id: ${{ vars.AMIASEA_DB_ADMINS_GROUP_ID }}

    steps:
      - uses: actions/checkout@v4

      - uses: hashicorp/setup-terraform@v3
        with:
          terraform_version: "1.14.6"
          terraform_wrapper: false

      - name: Authenticate to Azure (Write OIDC)
        uses: azure/login@v2
        with:
          client-id: ${{ vars.UAMI_WRITE_CLIENT_ID }}
          tenant-id: ${{ vars.TENANT_ID }}
          subscription-id: ${{ vars.SUBSCRIPTION_ID }}

      - name: Authority
        working-directory: ./terraform/authority
        run: |
          terraform init
          terraform apply -auto-approve

      - name: Set GHCR PAT to Vault
        run: |
          az keyvault secret set \
            --vault-name kv-amiasea \
            --name ghcr-pat \
            --value "${{ inputs.ghcr_pat }}"

      - name: Identity
        working-directory: ./terraform/identity
        run: |
          terraform init
          terraform apply -auto-approve

      # 1. Authenticate with the READ principal to fetch the key
      - name: Azure Login (Read OIDC)
        uses: azure/login@v2
        with:
          client-id: ${{ vars.UAMI_READ_CLIENT_ID }}
          tenant-id: ${{ vars.TENANT_ID }}
          subscription-id: ${{ vars.SUBSCRIPTION_ID }}

      # 1. Fetch the Multi-line PEM from Azure Key Vault
      - name: Fetch Sovereign Private Key
        run: |
          PEM_VALUE=$(az keyvault secret show \
            --vault-name "${{ vars.KEY_VAULT_NAME }}" \
            --name "${{ vars.AVIATOR_PRIVATE_KEY_NAME }}" \
            --query value -o tsv)
          
          # Mask the key so it's redacted as *** in all logs
          echo "::add-mask::$PEM_VALUE"

          # Use a heredoc (EOF) to save the multi-line PEM to the environment
          echo "GH_APP_PEM<<EOF" >> $GITHUB_ENV
          echo "$PEM_VALUE" >> $GITHUB_ENV
          echo "EOF" >> $GITHUB_ENV

      # 2. Use the Official Action to sign the JWT and get an Installation Token
      - name: Generate App Token
        uses: actions/create-github-app-token@v1
        id: app-token
        with:
          app-id: ${{ vars.AVIATOR_GH_APP_ID }}
          private-key: ${{ env.GH_APP_PEM }}
          owner: ${{ github.repository_owner }}

      # 3. Provision the TFE_TOKEN to the Org via CLI (State-Free)
      - name: Provision TFE_TOKEN to Org
        env:
          # Use the App Token (from Step 2) for CLI permission
          GH_TOKEN: ${{ steps.app-token.outputs.token }}
          # Use the Workflow Input for the secret value
          TFE_VALUE: ${{ inputs.TFE_TOKEN }}
        run: |
          gh secret set TFE_TOKEN \
            --org "${{ github.repository_owner }}" \
            --visibility private \
            --body "$TFE_VALUE"