name: Modules Upload

on:
  pull_request:
    types: [closed]
    branches: [main]
  workflow_dispatch:

jobs:
  # Job 1: Find all modules and output them as a JSON list
  list-modules:
    if: github.event_name == 'workflow_dispatch' || github.event.pull_request.merged == true
    runs-on: ubuntu-latest
    outputs:
      matrix: ${{ steps.set-matrix.outputs.matrix }}
    steps:
      - uses: actions/checkout@v4
      - id: set-matrix
        run: |
          MODULES=$(find terraform/modules -maxdepth 1 -mindepth 1 -type d -exec basename {} \; | jq -R -s -c 'split("\n")[:-1]')
          echo "matrix=$MODULES" >> $GITHUB_OUTPUT

  # Job 2: Run the actual sync logic for each module found
  sync-module:
    needs: list-modules
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        module: ${{ fromJson(needs.list-modules.outputs.matrix) }}
    permissions:
      id-token: write
      contents: read
    env:
      TF_ORG: "amiasea"
      TF_PROVIDER: "github"
      MODULE_DIR: "terraform/modules/${{ matrix.module }}"
      PR_TITLE: ${{ github.event.pull_request.title }}
    steps:
      - name: Checkout Code
        uses: actions/checkout@v4

      - name: Setup Terraform
        uses: hashicorp/setup-terraform@v3
        with:
          terraform_version: "1.15.3"

      - name: Generate Aliases Action
        uses: bendrucker/terraform-configuration-aliases-action@v1
        with:
          path: ${{ env.MODULE_DIR }}

      - name: 'Az CLI Login'
        uses: azure/login@v2
        with:
          client-id: ${{ vars.AZURE_CLIENT_ID }}
          tenant-id: ${{ vars.AZURE_TENANT_ID }}
          subscription-id: ${{ vars.AZURE_SUBSCRIPTION_ID }}

      - name: Process Sync and Upload
        run: |
          # 1. Fetch TF Token
          RAW_TOKEN=$(az keyvault secret show --id "${{ vars.TF_TOKEN_VERSIONLESS_ID }}" --query value -o tsv)
          echo "::add-mask::$RAW_TOKEN"
          TF_TOKEN=$RAW_TOKEN

          # 2. Check for required files
          if [[ ! -f "$MODULE_DIR/main.tf" || ! -f "$MODULE_DIR/README.md" ]]; then
            echo "SKIP: ${{ matrix.module }} - Missing main.tf or README.md."
            exit 0
          fi

          # 3. Validation (Alias file is now present thanks to the action step)
          cd "$MODULE_DIR"
          terraform init -backend=false && terraform validate
          cd -

          # 4. Registry API Logic
          BASE_URL="https://app.terraform.io/api/v2/organizations/$TF_ORG/registry-modules"
          META_URL="$BASE_URL/private/$TF_ORG/${{ matrix.module }}/$TF_PROVIDER"
          VER_URL="$META_URL/versions"

          # Ensure Registry Shell exists
          curl -s -o /dev/null --header "Authorization: Bearer $TF_TOKEN" \
            --header "Content-Type: application/vnd.api+json" \
            --request POST \
            --data "{\"data\":{\"type\":\"registry-modules\",\"attributes\":{\"name\":\"${{ matrix.module }}\",\"provider\":\"$TF_PROVIDER\",\"registry-name\":\"private\"}}}" \
            "$BASE_URL"

          # Fetch Version & Increment
          MODULE_META=$(curl -s --header "Authorization: Bearer $TF_TOKEN" "$META_URL")
          LATEST_VERSION=$(echo "$MODULE_META" | jq -r '.data.attributes."latest-version" // "0.0.0"')
          [ "$LATEST_VERSION" == "null" ] && LATEST_VERSION="0.0.0"

          IFS='.' read -r MAJOR MINOR PATCH <<< "$LATEST_VERSION"
          if [[ "$PR_TITLE" == *"feat"* ]]; then
            NEXT_VERSION="$MAJOR.$((MINOR + 1)).0"
          elif [[ "$PR_TITLE" == *"fix"* ]]; then
            NEXT_VERSION="$MAJOR.$MINOR.$((PATCH + 1))"
          else
            NEXT_VERSION="$((MAJOR + 1)).0.0"
          fi

          # Create Version and Get Upload URL
          RESPONSE=$(curl -s --header "Authorization: Bearer $TF_TOKEN" \
            --header "Content-Type: application/vnd.api+json" \
            --request POST \
            --data "{\"data\":{\"type\":\"registry-module-versions\",\"attributes\":{\"version\":\"$NEXT_VERSION\"}}}" \
            "$VER_URL")
          
          UPLOAD_URL=$(echo "$RESPONSE" | jq -r '.data.links.upload // empty')

          if [ -n "$UPLOAD_URL" ]; then
            cd "$MODULE_DIR"
            # Remove the temporary alias file so it is NOT uploaded to the registry
            rm -f _aliases.tf.json
            tar -czf ../../../module_upload.tar.gz .
            curl -s --request PUT --header "Content-Type: application/octet-stream" --data-binary @../../../module_upload.tar.gz "$UPLOAD_URL"
            echo "✅ SUCCESS: ${{ matrix.module }} v$NEXT_VERSION uploaded."
          else
            echo "ℹ️ INFO: ${{ matrix.module }} version $NEXT_VERSION already exists."
          fi
