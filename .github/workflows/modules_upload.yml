name: Modules Upload

on:
  pull_request:
    types: [closed]
    branches: [main]
  workflow_dispatch:

jobs:
  list-modules:
    if: github.event_name == 'workflow_dispatch' || github.event.pull_request.merged == true
    runs-on: ubuntu-latest
    outputs:
      matrix: ${{ steps.set-matrix.outputs.matrix }}
    steps:
      - uses: actions/checkout@v4
      - id: set-matrix
        run: |
          MODULES=$(find terraform/modules -maxdepth 1 -mindepth 1 -type d -exec basename {} \; | jq -R -s -c 'split("\n")[:-1]')
          echo "matrix=$MODULES" >> $GITHUB_OUTPUT

  sync-module:
    needs: list-modules
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        module: ${{ fromJson(needs.list-modules.outputs.matrix) }}
    permissions:
      id-token: write
      contents: read
    env:
      TF_ORG: "amiasea"
      TF_PROVIDER: "github"
      MODULE_DIR: "terraform/modules/${{ matrix.module }}"
      PR_TITLE: ${{ github.event.pull_request.title }}
    steps:
      - name: Checkout Code
        uses: actions/checkout@v4

      - name: Setup Terraform
        uses: hashicorp/setup-terraform@v3
        with:
          terraform_version: "1.15.3"

      - name: Generate Aliases Action
        uses: bendrucker/terraform-configuration-aliases-action@v1
        with:
          path: ${{ env.MODULE_DIR }}

      - name: 'Az CLI Login'
        uses: azure/login@v2
        with:
          client-id: ${{ vars.AZURE_CLIENT_ID }}
          tenant-id: ${{ vars.AZURE_TENANT_ID }}
          subscription-id: ${{ vars.AZURE_SUBSCRIPTION_ID }}

      - name: Process Sync and Upload
        run: |
          # 1. Auth Setup
          RAW_TOKEN=$(az keyvault secret show --id "${{ vars.TF_TOKEN_VERSIONLESS_ID }}" --query value -o tsv)
          echo "::add-mask::$RAW_TOKEN"
          TF_TOKEN=$RAW_TOKEN

          # 2. API Config
          BASE_URL="https://app.terraform.io/api/v2/organizations/$TF_ORG/registry-modules"
          META_URL="$BASE_URL/private/$TF_ORG/${{ matrix.module }}/$TF_PROVIDER"
          VER_URL="$META_URL/versions"

          # 3. Robust Version Retrieval
          # We fetch ALL versions and sort them to find the true highest version
          MODULE_META=$(curl -s --header "Authorization: Bearer $TF_TOKEN" "$META_URL")
          
          LATEST_VERSION=$(echo "$MODULE_META" | jq -r '
            if .data.attributes."version-statuses" | length > 0 then
              .data.attributes."version-statuses" | map(.version) | sort_by(split(".") | map(tonumber)) | last
            else
              "0.0.0"
            fi')

          [ "$LATEST_VERSION" == "null" ] || [ -z "$LATEST_VERSION" ] && LATEST_VERSION="0.0.0"
          
          echo "DETECTED LATEST VERSION: $LATEST_VERSION"

          # 4. Increment Logic
          IFS='.' read -r MAJOR MINOR PATCH <<< "$LATEST_VERSION"
          MAJOR=${MAJOR:-0}; MINOR=${MINOR:-0}; PATCH=${PATCH:-0}

          if [[ "$PR_TITLE" == *"feat"* ]]; then
            NEXT_VERSION="$MAJOR.$((MINOR + 1)).0"
          elif [[ "$PR_TITLE" == *"fix"* ]]; then
            NEXT_VERSION="$MAJOR.$MINOR.$((PATCH + 1))"
          else
            NEXT_VERSION="$((MAJOR + 1)).0.0"
          fi

          echo "ATTEMPTING TO CREATE VERSION: $NEXT_VERSION"

          # 5. Validation
          cd "$MODULE_DIR"
          terraform init -backend=false && terraform validate
          cd -

          # 6. Create Version & Upload
          RESPONSE=$(curl -s --header "Authorization: Bearer $TF_TOKEN" \
            --header "Content-Type: application/vnd.api+json" \
            --request POST \
            --data "{\"data\":{\"type\":\"registry-module-versions\",\"attributes\":{\"version\":\"$NEXT_VERSION\"}}}" \
            "$VER_URL")
          
          UPLOAD_URL=$(echo "$RESPONSE" | jq -r '.data.links.upload // empty')

          if [ -n "$UPLOAD_URL" ]; then
            cd "$MODULE_DIR"
            rm -f aliased-providers.tf.json
            tar -czf ../../../module_upload.tar.gz .
            curl -s --request PUT --header "Content-Type: application/octet-stream" --data-binary @../../../module_upload.tar.gz "$UPLOAD_URL"
            echo "✅ SUCCESS: ${{ matrix.module }} v$NEXT_VERSION uploaded."
          else
            echo "❌ ERROR: Version $NEXT_VERSION creation failed."
            echo "API RESPONSE: $RESPONSE"
            exit 1
          fi
