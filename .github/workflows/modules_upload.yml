name: Modules Upload

on:
  pull_request:
    types: [closed]
    branches: [main]
  workflow_dispatch:

jobs:
  sweep-and-increment:
    if: github.event.pull_request.merged == true || github.event_name == 'workflow_dispatch'
    runs-on: ubuntu-latest
    permissions:
      id-token: write
      contents: read
    env:
      TF_ORG: "amiasea"
      TF_PROVIDER: "aws"
      MODULES_ROOT: "terraform/modules"
      BASE_URL: "https://app.terraform.io/api/v2/organizations/$TF_ORG/registry-modules"
      PR_TITLE: ${{ github.event.pull_request.title }}

    steps:
      - name: Checkout Code
        uses: actions/checkout@v4
        with:
          fetch-depth: 2 

      - name: Setup Terraform
        uses: hashicorp/setup-terraform@v3

      - name: 'Az CLI Login'
        uses: azure/login@v2
        with:
          client-id: ${{ vars.AZURE_CLIENT_ID }}
          tenant-id: ${{ vars.AZURE_TENANT_ID }}
          subscription-id: ${{ vars.AZURE_SUBSCRIPTION_ID }}

      - name: Fetch TF Token
        run: |
          echo "::group::Fetching Token"
          RAW_TOKEN=$(az keyvault secret show --id "${{ vars.TF_TOKEN_VERSIONLESS_ID }}" --query value -o tsv)
          echo "::add-mask::$RAW_TOKEN"
          echo "TF_TOKEN_app_terraform_io=$RAW_TOKEN" >> $GITHUB_ENV
          echo "::endgroup::"

      - name: Detect, Validate and Publish
        run: |
          echo "::group::Git Discovery"
          CHANGED_FILES=$(git diff --name-only HEAD^ HEAD)
          CHANGED_MODULES=$(echo "$CHANGED_FILES" | grep "^${{ env.MODULES_ROOT }}/" | cut -d/ -f3 | sort -u)
          
          if [ -z "$CHANGED_MODULES" ]; then
            echo "LOG: No module changes detected. Exiting."
            exit 0
          fi
          echo "LOG: Modules identified: $CHANGED_MODULES"
          echo "::endgroup::"

          for MODULE_NAME in $CHANGED_MODULES; do
            echo "################################################################"
            echo " PROCESSING: $MODULE_NAME"
            echo "################################################################"
            
            DIR="${{ env.MODULES_ROOT }}/$MODULE_NAME"
            if [ ! -d "$DIR" ]; then continue; fi

            SHELL_URL="${{ env.BASE_URL }}"
            META_URL="${{ env.BASE_URL }}/private/$TF_ORG/$MODULE_NAME/$TF_PROVIDER"
            VER_URL="$META_URL/versions"

            echo "LOG: [1/6] Validating Module..."
            cd "$DIR"
            terraform init -backend=false
            if ! terraform validate; then
              echo "ERROR: Validation failed for $MODULE_NAME. Skipping."
              cd - > /dev/null; continue
            fi
            cd - > /dev/null

            echo "LOG: [2/6] Checking for README.md..."
            if [ ! -f "$DIR/README.md" ]; then
              echo "ERROR: Missing README.md in $DIR. Documentation is mandatory for PMR."
              continue
            fi
            echo "LOG: README.md found."

            echo "LOG: [3/6] Ensuring Registry Shell exists..."
            SHELL_RESP=$(curl -s -w "\nHTTP_STATUS: %{http_code}" --header "Authorization: Bearer $TF_TOKEN_app_terraform_io" \
                 --header "Content-Type: application/vnd.api+json" \
                 --request POST \
                 --data "{\"data\":{\"type\":\"registry-modules\",\"attributes\":{\"name\":\"$MODULE_NAME\",\"provider\":\"$TF_PROVIDER\",\"registry-name\":\"private\",\"no-code\":false}}}" \
                 "$SHELL_URL")
            
            HTTP_STATUS=$(echo "$SHELL_RESP" | grep "HTTP_STATUS" | cut -d' ' -f2)
            [ "$HTTP_STATUS" == "422" ] && echo "LOG: Shell already exists." || echo "LOG: Shell created."

            echo "LOG: [4/6] Fetching current version metadata..."
            MODULE_META=$(curl -s --header "Authorization: Bearer $TF_TOKEN_app_terraform_io" "$META_URL")
            
            LATEST_VERSION=$(echo "$MODULE_META" | jq -r '
              if .data.attributes."latest-version" != null and .data.attributes."latest-version" != "" then 
                .data.attributes."latest-version" 
              elif (.data.attributes."version-statuses" | length > 0) then 
                .data.attributes."version-statuses" | map(.version) | sort_by(split(".") | map(tonumber)) | last 
              else "0.0.0" end')
            
            [ "$LATEST_VERSION" == "null" ] || [ -z "$LATEST_VERSION" ] && LATEST_VERSION="0.0.0"
            IFS='.' read -r MAJOR MINOR PATCH <<< "$LATEST_VERSION"
            
            if [[ "$PR_TITLE" == *"feat"* ]]; then
              NEXT_VERSION="$MAJOR.$((MINOR + 1)).0"
              LOG_MSG="Feature bump"
            elif [[ "$PR_TITLE" == *"fix"* ]]; then
              NEXT_VERSION="$MAJOR.$MINOR.$((PATCH + 1))"
              LOG_MSG="Fix bump"
            else
              NEXT_VERSION="$((MAJOR + 1)).0.0"
              LOG_MSG="Major bump"
            fi
            echo "LOG: $LOG_MSG -> v$NEXT_VERSION"

            echo "LOG: [5/6] Requesting upload URL..."
            RESPONSE=$(curl -s --header "Authorization: Bearer $TF_TOKEN_app_terraform_io" \
                 --header "Content-Type: application/vnd.api+json" \
                 --request POST \
                 --data "{\"data\":{\"type\":\"registry-module-versions\",\"attributes\":{\"version\":\"$NEXT_VERSION\"}}}" \
                 "$VER_URL")

            UPLOAD_URL=$(echo "$RESPONSE" | jq -r '.data.links.upload // .data.attributes."upload-url" // empty')

            if [ -n "$UPLOAD_URL" ] && [ "$UPLOAD_URL" != "null" ]; then
              echo "::group::[6/6] Packaging & Uploading"
              cd "$DIR"
              tar -czf ../../../module_upload.tar.gz .
              cd - > /dev/null
              
              UPLOAD_RESULT=$(curl -s -w "\nHTTP_STATUS: %{http_code}" --request PUT \
                   --header "Content-Type: application/octet-stream" \
                   --data-binary @module_upload.tar.gz \
                   "$UPLOAD_URL")
              
              rm module_upload.tar.gz
              echo "::endgroup::"
              echo "SUCCESS: $MODULE_NAME v$NEXT_VERSION live."
            else
              echo "ERROR: No Upload URL. Resp: $RESPONSE"
            fi
            echo "----------------------------------------------------------------"
          done
