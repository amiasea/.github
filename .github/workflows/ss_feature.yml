name: ss_feature_reservation

on:
  workflow_dispatch:

  # schedule:
  #   - cron: "*/15 * * * *"


permissions:
  contents: write
  issues: write


jobs:
  feature-reservation:

    runs-on: ubuntu-latest

    steps:

      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Repository metadata
        run: |
          echo "================================="
          echo "Solution Story Feature Reservation"
          echo "================================="
          echo "Repository: ${{ github.repository }}"
          echo "Run ID: ${{ github.run_id }}"


      - name: Ensure lifecycle labels exist
        env:
          GH_TOKEN: ${{ github.token }}
        run: |

          gh label create "feature-reserved" \
            --repo "${{ github.repository }}" \
            --description "Feature reservation completed" \
            --color "0E8A16" \
            || true


          gh label create "rejected-validation-error" \
            --repo "${{ github.repository }}" \
            --description "Feature rejected due to validation errors" \
            --color "B60205" \
            || true


      - name: Process Feature issues
        env:
          GH_TOKEN: ${{ github.token }}
        run: |

          echo "Querying Feature issues..."


          ISSUES=$(gh issue list \
            --repo "${{ github.repository }}" \
            --state open \
            --type Feature \
            --limit 100 \
            --json number,title \
            --jq '.[] | "\(.number)|\(.title)"')


          if [ -z "$ISSUES" ]; then
            echo "No Feature issues found."
            exit 0
          fi


          echo "$ISSUES"


          while IFS="|" read -r NUMBER TITLE
          do

            echo ""
            echo "---------------------------------"
            echo "Processing issue #$NUMBER"
            echo "Title: $TITLE"


            if [[ "$TITLE" =~ ^\[Feature\]:[[:space:]]*([a-z][a-z0-9]*(-[a-z0-9]+)*)$ ]]
            then

              FEATURE_SLUG="${BASH_REMATCH[1]}"


              echo "Feature Slug: $FEATURE_SLUG"
              echo "Validation passed"


              BRANCH_NAME="feat-${FEATURE_SLUG}-${NUMBER}"


              echo "Creating linked development branch"
              echo "Branch: $BRANCH_NAME"
              echo "Base: main"


              gh issue develop "$NUMBER" \
                --repo "${{ github.repository }}" \
                --branch-repo "${{ github.repository }}" \
                --name "$BRANCH_NAME" \
                --base main


              echo "Branch created and linked"


              gh issue edit "$NUMBER" \
                --repo "${{ github.repository }}" \
                --add-label "feature-reserved"


              echo "Feature reservation complete"


            else

              echo "Validation failed"


              gh issue edit "$NUMBER" \
                --repo "${{ github.repository }}" \
                --add-label "rejected-validation-error"


              gh issue comment "$NUMBER" \
                --repo "${{ github.repository }}" \
                --body "
                  ## Feature rejected

                  The Feature title failed validation.

                  Expected format:

                  \`[Feature]: feature-slug\`

                  Received:

                  \`$TITLE\`
                  "


              gh issue close "$NUMBER" \
                --repo "${{ github.repository }}"


              echo "Issue rejected"


            fi


          done <<< "$ISSUES"


      - name: Verify linked branches
        env:
          GH_TOKEN: ${{ github.token }}
        run: |

          echo "Verifying linked branches..."


          ISSUES=$(gh issue list \
            --repo "${{ github.repository }}" \
            --state open \
            --label feature-reserved \
            --limit 100 \
            --json number \
            --jq '.[].number')


          if [ -z "$ISSUES" ]; then
            echo "No reserved features found."
            exit 0
          fi


          while read -r NUMBER
          do

            echo ""
            echo "Issue #$NUMBER"


            gh issue develop \
              --repo "${{ github.repository }}" \
              --list "$NUMBER"


          done <<< "$ISSUES"