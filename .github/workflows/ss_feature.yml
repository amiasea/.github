name: ss_feature_reservation

on:
  schedule:
    - cron: "*/15 * * * *"

  workflow_dispatch:

permissions:
  contents: write
  issues: write

jobs:
  feature-reservation:

    runs-on: ubuntu-latest

    steps:

      - name: Process feature issues
        uses: actions/github-script@v7
        with:
          github-token: ${{ secrets.GITHUB_TOKEN }}
          script: |

            const owner = context.repo.owner;
            const repo = context.repo.repo;

            console.log("=================================");
            console.log("Solution Story Feature Reservation");
            console.log("=================================");
            console.log(`Owner: ${owner}`);
            console.log(`Repository: ${repo}`);
            console.log(`Run ID: ${context.runId}`);


            //
            // STEP 1 - Verify repository access
            //
            console.log("");
            console.log("STEP 1: Repository metadata");


            const repository =
              await github.rest.repos.get({
                owner,
                repo
              });


            console.log(
              `Default branch: ${repository.data.default_branch}`
            );


            //
            // STEP 2 - Query issues
            //
            console.log("");
            console.log("STEP 2: Query open issues");


            const issues =
              await github.paginate(
                github.rest.issues.listForRepo,
                {
                  owner,
                  repo,
                  state: "open",
                  per_page: 100
                }
              );


            console.log(
              `Open issues found: ${issues.length}`
            );


            for (const issue of issues) {

              console.log("---------------------------------");
              console.log(`Issue #${issue.number}`);
              console.log(`Title: ${issue.title}`);
              console.log(
                `Labels: ${
                  issue.labels
                    .map(l => l.name)
                    .join(", ")
                }`
              );

              console.log(
                `Has body: ${!!issue.body}`
              );

              console.log(
                `Is PR: ${!!issue.pull_request}`
              );

            }


            //
            // STEP 3 - Filter feature issues
            //
            console.log("");
            console.log("STEP 3: Filter feature issues");


            const featureIssues =
              issues.filter(issue =>
                issue.labels.some(
                  label =>
                    label.name.toLowerCase() === "feature"
                )
              );


            console.log(
              `Feature issues found: ${featureIssues.length}`
            );


            //
            // STEP 4 - Process each issue
            //
            for (const issue of featureIssues) {

              console.log("");
              console.log("===============================");
              console.log(
                `Processing issue #${issue.number}`
              );


              const body = issue.body ?? "";


              console.log("Issue body:");
              console.log(body);


              const slugMatch =
                body.match(
                  /### Feature Slug\s*\n\s*([^\n]+)/i
                );


              if (!slugMatch) {

                console.log(
                  "FAILED: Feature Slug not found"
                );

                continue;
              }


              const featureSlug =
                slugMatch[1].trim();


              console.log(
                `Feature slug: ${featureSlug}`
              );


              const slugRegex =
                /^[a-z][a-z0-9]*(?:-[a-z0-9]+)*$/;


              if (!slugRegex.test(featureSlug)) {

                console.log(
                  "FAILED: Invalid slug format"
                );

                continue;
              }


              console.log(
                "PASSED: Feature slug validation"
              );


              const branchName =
                `feat-${featureSlug}-${issue.number}`;


              console.log(
                `Target branch: ${branchName}`
              );


              //
              // STEP 5 - Check branch
              //
              console.log(
                "Checking branch existence..."
              );


              let branchExists = true;


              try {

                await github.rest.repos.getBranch({
                  owner,
                  repo,
                  branch: branchName
                });


              } catch {

                branchExists = false;

              }


              console.log(
                `Branch exists: ${branchExists}`
              );


              //
              // STEP 6 - Create branch
              //
              if (!branchExists) {

                console.log(
                  "Getting main branch..."
                );


                const main =
                  await github.rest.repos.getBranch({
                    owner,
                    repo,
                    branch: "main"
                  });


                console.log(
                  `Creating branch from SHA ${main.data.commit.sha}`
                );


                await github.rest.git.createRef({
                  owner,
                  repo,
                  ref: `refs/heads/${branchName}`,
                  sha: main.data.commit.sha
                });


                console.log(
                  "Branch created successfully"
                );

              }


              //
              // STEP 7 - Update issue
              //
              console.log(
                "Adding labels..."
              );


              await github.rest.issues.addLabels({
                owner,
                repo,
                issue_number: issue.number,
                labels: [
                  "feature-reserved",
                  `branch:${branchName}`
                ]
              });


              console.log(
                "Labels updated"
              );


              console.log(
                "COMPLETE"
              );

            }


            console.log("");
            console.log("Workflow complete");