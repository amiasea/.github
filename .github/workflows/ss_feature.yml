name: ss_feature_reservation

on:
  schedule:
    - cron: "*/15 * * * *"

  workflow_dispatch:

permissions:
  contents: write
  issues: write

jobs:
  feature-reservation:

    runs-on: ubuntu-latest

    steps:

      - name: Repository metadata
        run: |
          echo "================================="
          echo "Solution Story Feature Reservation"
          echo "================================="
          echo "Repository: ${{ github.repository }}"
          echo "Run ID: ${{ github.run_id }}"


      - name: Query Feature issues
        env:
          GH_TOKEN: ${{ github.token }}
        run: |

          echo "Querying Feature issues..."

          gh issue list \
            --repo "${{ github.repository }}" \
            --state open \
            --type Feature \
            --limit 100 \
            --json number,title,body \
            > feature-issues.json


          echo ""
          echo "Feature issues found:"

          jq -r '
            .[] |
            "Issue #\(.number): \(.title)"
          ' feature-issues.json


      - name: Validate Feature issues
        env:
          GH_TOKEN: ${{ github.token }}
        run: |

          echo "Validating Feature Slugs..."

          rm -f validated-features.txt


          jq -c '.[]' feature-issues.json | while read ISSUE
          do

            NUMBER=$(echo "$ISSUE" | jq -r '.number')
            TITLE=$(echo "$ISSUE" | jq -r '.title')
            BODY=$(echo "$ISSUE" | jq -r '.body // ""')


            echo "---------------------------------"
            echo "Processing #$NUMBER"
            echo "Title: $TITLE"


            FEATURE_SLUG=$(echo "$BODY" |
              awk '
                /### Feature Slug/ {
                  getline
                  print
                  exit
                }
              ' |
              xargs)


            echo "Feature Slug: $FEATURE_SLUG"


            if [[ "$FEATURE_SLUG" =~ ^[a-z][a-z0-9]*(?:-[a-z0-9]+)*$ ]]
            then

              echo "Feature Slug validation passed"

              echo "$NUMBER|$FEATURE_SLUG" \
                >> validated-features.txt

            else

              echo "Feature Slug validation failed"


              gh issue edit "$NUMBER" \
                --repo "${{ github.repository }}" \
                --add-label "rejected-validation-error"


              gh issue comment "$NUMBER" \
                --repo "${{ github.repository }}" \
                --body "
                ## Feature rejected

                This Feature issue failed validation.

                Reason:
                Invalid Feature Slug:
                \`$FEATURE_SLUG\`

                Expected:
                lowercase kebab-case
                "


              gh issue close "$NUMBER" \
                --repo "${{ github.repository }}"


            fi

          done


      - name: Create linked feature branches
        env:
          GH_TOKEN: ${{ github.token }}
        run: |

          if [ ! -f validated-features.txt ]; then
            echo "No validated features."
            exit 0
          fi


          while IFS="|" read -r NUMBER FEATURE_SLUG
          do

            BRANCH_NAME="feat-${FEATURE_SLUG}-${NUMBER}"


            echo "================================="
            echo "Creating linked branch"
            echo "Issue: #$NUMBER"
            echo "Branch: $BRANCH_NAME"
            echo "Base: main"


            gh issue develop "$NUMBER" \
              --repo "${{ github.repository }}" \
              --name "$BRANCH_NAME" \
              --base main


            echo "Development branch created"

          done < validated-features.txt


      - name: Apply reservation label
        env:
          GH_TOKEN: ${{ github.token }}
        run: |

          if [ ! -f validated-features.txt ]; then
            echo "No validated features."
            exit 0
          fi


          while IFS="|" read -r NUMBER FEATURE_SLUG
          do

            gh issue edit "$NUMBER" \
              --repo "${{ github.repository }}" \
              --add-label "feature-reserved"


            echo "Issue #$NUMBER marked feature-reserved"

          done < validated-features.txt


      - name: Verify development links
        env:
          GH_TOKEN: ${{ github.token }}
        run: |

          if [ ! -f validated-features.txt ]; then
            echo "No validated features."
            exit 0
          fi


          while IFS="|" read -r NUMBER FEATURE_SLUG
          do

            echo ""
            echo "Development links for issue #$NUMBER"

            gh issue develop \
              --repo "${{ github.repository }}" \
              --list "$NUMBER"

          done < validated-features.txt