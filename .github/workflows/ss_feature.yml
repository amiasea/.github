name: ss_feature_reservation

on:
  schedule:
    - cron: "*/15 * * * *"

  workflow_dispatch:

permissions:
  contents: write
  issues: write

jobs:
  feature-reservation:

    runs-on: ubuntu-latest

    steps:
      - name: Process Feature issues
        uses: actions/github-script@v7
        with:
          github-token: ${{ secrets.GITHUB_TOKEN }}
          script: |

            const owner = context.repo.owner;
            const repo = context.repo.repo;

            console.log("=================================");
            console.log("Solution Story Feature Reservation");
            console.log("=================================");
            console.log(`Repository: ${owner}/${repo}`);
            console.log(`Run ID: ${context.runId}`);


            const slugRegex =
              /^[a-z][a-z0-9]*(?:-[a-z0-9]+)*$/;


            //
            // Query open issues with Issue Type
            //
            console.log("");
            console.log("Querying open issues...");


            const query = `
              query($owner:String!, $repo:String!) {
                repository(owner:$owner, name:$repo) {
                  issues(first:100, states:OPEN) {
                    nodes {
                      number
                      title
                      body
                      url
                      issueType {
                        name
                      }
                    }
                  }
                }
              }
            `;


            const result =
              await github.graphql(
                query,
                {
                  owner,
                  repo
                }
              );


            const issues =
              result.repository.issues.nodes;


            console.log(
              `Open issues found: ${issues.length}`
            );


            for (const issue of issues) {

              console.log("---------------------------------");
              console.log(`#${issue.number}: ${issue.title}`);
              console.log(
                `Issue Type: ${
                  issue.issueType?.name ?? "none"
                }`
              );

            }


            //
            // Only process Feature issues
            //
            const featureIssues =
              issues.filter(issue =>
                issue.issueType?.name === "Feature"
              );


            console.log("");
            console.log(
              `Feature issues found: ${featureIssues.length}`
            );


            for (const issue of featureIssues) {

              console.log("");
              console.log("===============================");
              console.log(
                `Processing Feature #${issue.number}`
              );


              const body =
                issue.body ?? "";


              //
              // Extract Feature Slug
              //
              const slugMatch =
                body.match(
                  /### Feature Slug\s*\n\s*([^\n]+)/i
                );


              if (!slugMatch) {

                await rejectIssue(
                  issue,
                  "Feature Slug was not found."
                );

                continue;
              }


              const featureSlug =
                slugMatch[1].trim();


              console.log(
                `Feature Slug: ${featureSlug}`
              );


              if (!slugRegex.test(featureSlug)) {

                await rejectIssue(
                  issue,
                  `Invalid Feature Slug '${featureSlug}'. Expected lowercase kebab-case.`
                );

                continue;
              }


              console.log(
                "Feature Slug validation passed"
              );


              const branchName =
                `feat-${featureSlug}-${issue.number}`;


              console.log(
                `Target branch: ${branchName}`
              );


              //
              // Check branch existence
              //
              let branchExists = true;


              try {

                await github.rest.repos.getBranch({
                  owner,
                  repo,
                  branch: branchName
                });

              } catch {

                branchExists = false;

              }


              console.log(
                `Branch exists: ${branchExists}`
              );


              //
              // Create branch
              //
              if (!branchExists) {

                console.log(
                  "Creating branch from main..."
                );


                const main =
                  await github.rest.repos.getBranch({
                    owner,
                    repo,
                    branch: "main"
                  });


                await github.rest.git.createRef({
                  owner,
                  repo,
                  ref: `refs/heads/${branchName}`,
                  sha: main.data.commit.sha
                });


                console.log(
                  "Branch created"
                );

              }


              //
              // Update issue labels
              //
              await github.rest.issues.addLabels({
                owner,
                repo,
                issue_number: issue.number,
                labels: [
                  "feature-reserved"
                ]
              });


              console.log(
                "Lifecycle label applied"
              );


              //
              // Update evidence block
              //
              await updateEvidence(
                issue,
                branchName
              );


              console.log(
                "Feature reservation complete"
              );

            }



            async function rejectIssue(issue, reason) {

              console.log(
                `Rejecting issue #${issue.number}`
              );

              console.log(reason);


              await github.rest.issues.addLabels({
                owner,
                repo,
                issue_number: issue.number,
                labels: [
                  "rejected-validation-error"
                ]
              });


              await github.rest.issues.createComment({
                owner,
                repo,
                issue_number: issue.number,
                body:
            `## Feature rejected

            This Feature issue failed validation.

            Reason:
            ${reason}

            Create a new Feature issue after correcting the problem.`
                          });


                          await github.rest.issues.update({
                            owner,
                            repo,
                            issue_number: issue.number,
                            state: "closed"
                          });

                        }



            async function updateEvidence(issue, branchName) {

              const markerStart =
                "<!-- solution-story-managed -->";

              const markerEnd =
                "<!-- end solution-story-managed -->";


              const evidence =
              `${markerStart}

              Status:
              Reserved

              Branch:
              [${branchName}](https://github.com/${owner}/${repo}/tree/${branchName})

              ${markerEnd}`;


              const body =
                issue.body ?? "";


              const updated =
                body.replace(
                  /<!-- solution-story-managed -->[\s\S]*<!-- end solution-story-managed -->/,
                  evidence
                );


              if (updated === body) {

                console.log(
                  "No evidence marker found. Skipping body update."
                );

                return;

              }


              await github.rest.issues.update({
                owner,
                repo,
                issue_number: issue.number,
                body: updated
              });


              console.log(
                "Evidence block updated"
              );

            }