name: Stacks Upload

on:
  workflow_run:
    workflows: ["Modules Upload"]
    types: [completed]
  workflow_dispatch:

jobs:
  deploy-stacks:
    if: ${{ github.event_name == 'workflow_dispatch' || github.event.workflow_run.conclusion == 'success' }}
    runs-on: ubuntu-latest
    permissions:
      id-token: write
      contents: read
    env:
      TF_ORG: "amiasea"
      TF_PROJECT: "amiasea"
      STACKS_ROOT: "terraform/stacks"

    steps:
      - name: Checkout Code
        uses: actions/checkout@v4
        # We removed fetch-depth because we are no longer relying on git diff

      - name: 'Az CLI Login'
        uses: azure/login@v2
        with:
          client-id: ${{ vars.AZURE_CLIENT_ID }}
          tenant-id: ${{ vars.AZURE_TENANT_ID }}
          subscription-id: ${{ vars.AZURE_SUBSCRIPTION_ID }}

      - name: Fetch TF Token
        run: |
          RAW_TOKEN=$(az keyvault secret show --id "${{ vars.TF_TOKEN_VERSIONLESS_ID }}" --query value -o tsv)
          echo "::add-mask::$RAW_TOKEN"
          echo "TF_TOKEN_app_terraform_io=$RAW_TOKEN" >> $GITHUB_ENV

      - name: Setup Terraform
        uses: hashicorp/setup-terraform@v3
        with:
          terraform_version: "1.14.8"
          cli_config_credentials_token: ${{ env.TF_TOKEN_app_terraform_io }}

      - name: Sync All Stacks from Filesystem
        run: |
          echo "::group::Stack Discovery"
          # Find all directories that contain at least one stack file
          # This replaces 'git diff' entirely
          ALL_STACKS=$(find ${{ env.STACKS_ROOT }} -maxdepth 1 -mindepth 1 -type d -exec basename {} \;)
          
          if [ -z "$ALL_STACKS" ]; then
            echo "LOG: No stack directories found. Exiting."
            exit 0
          fi
          echo "Stacks to be synchronized: $ALL_STACKS"
          echo "::endgroup::"

          for STACK_NAME in $ALL_STACKS; do
            echo "################################################################"
            echo " SYNCING STACK: $STACK_NAME"
            echo "################################################################"
            
            STACK_DIR="${{ env.STACKS_ROOT }}/$STACK_NAME"
            
            if [[ ! -f "$STACK_DIR/main.tfcomponent.hcl" ]]; then
              echo "SKIP: $STACK_NAME - Missing main.tfcomponent.hcl."
              continue
            fi

            cd "$STACK_DIR"

            echo "LOG: [1/3] Initializing & Validating..."
            terraform stacks init
            terraform stacks validate

            echo "LOG: [2/3] Ensuring Stack Shell exists..."
            # If the shell is missing, this creates it. If it exists, it continues.
            terraform stacks create \
              -organization-name ${{ env.TF_ORG }} \
              -project-name "${{ env.TF_PROJECT }}" \
              -stack-name "$STACK_NAME" || echo "INFO: Shell already exists for $STACK_NAME"

            echo "LOG: [3/3] Forcing Configuration Upload (Speculative)..."
            # Since we aren't checking diffs, this always uploads the current local state.
            terraform stacks configuration upload \
              -organization-name ${{ env.TF_ORG }} \
              -project-name "${{ env.TF_PROJECT }}" \
              -stack-name "$STACK_NAME" \
              -speculative

            cd - > /dev/null
            echo "SUCCESS: $STACK_NAME is up to date."
            echo "----------------------------------------------------------------"
          done

      - name: Success Summary
        run: |
          echo "SUCCESS: All stacks in the repository have been synchronized with HCP Terraform."
