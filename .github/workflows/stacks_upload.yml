name: Stacks Upload

on:
  workflow_run:
    workflows: ["Modules Upload"]
    types: [completed]
  workflow_dispatch:

jobs:
  deploy-stacks:
    if: ${{ github.event_name == 'workflow_dispatch' || github.event.workflow_run.conclusion == 'success' }}
    runs-on: ubuntu-latest
    permissions:
      id-token: write
      contents: read
    env:
      TF_ORG: "amiasea"
      TF_PROJECT: "amiasea"
      STACKS_ROOT: "terraform/stacks"
      TF_LOG: "DEBUG" 

    steps:
      - name: Checkout Code
        uses: actions/checkout@v4

      - name: 'Az CLI Login'
        uses: azure/login@v2
        with:
          client-id: ${{ vars.AZURE_CLIENT_ID }}
          tenant-id: ${{ vars.AZURE_TENANT_ID }}
          subscription-id: ${{ vars.AZURE_SUBSCRIPTION_ID }}

      - name: Fetch TF Token
        run: |
          RAW_TOKEN=$(az keyvault secret show --id "${{ vars.TF_TOKEN_VERSIONLESS_ID }}" --query value -o tsv)
          echo "::add-mask::$RAW_TOKEN"
          echo "TF_TOKEN_app_terraform_io=$RAW_TOKEN" >> $GITHUB_ENV

      - name: Setup Terraform
        uses: hashicorp/setup-terraform@v3
        with:
          terraform_version: "1.14.8"
          cli_config_credentials_token: ${{ env.TF_TOKEN_app_terraform_io }}

      - name: Sync All Stacks from Filesystem
        run: |
          # Use find to locate all directories in the stacks root
          for STACK_NAME in $(find ${{ env.STACKS_ROOT }} -maxdepth 1 -mindepth 1 -type d -exec basename {} \;) ; do
            echo "################################################################"
            echo " SYNCING STACK: $STACK_NAME"
            echo "################################################################"
            
            STACK_DIR="${{ env.STACKS_ROOT }}/$STACK_NAME"
            cd "$STACK_DIR"

            # 1. PRE-UPLOAD AUDIT
            echo "LOG: Current files in $STACK_NAME:"
            ls -F

            # 2. INIT & VALIDATE (Required to ensure HCL is correct)
            echo "LOG: [1/3] Initializing & Validating..."
            terraform stacks init
            terraform stacks validate

            # 3. THE "CLEAN PACK" TRICK
            # We MUST remove .terraform before upload because the CLI's internal 
            # packager will include it, often obscuring the root HCL files.
            echo "LOG: Cleaning up provider binaries to ensure a clean upload..."
            rm -rf .terraform .terraform.lock.hcl

            # 4. ENSURE SHELL
            echo "LOG: [2/3] Ensuring Stack Shell exists..."
            terraform stacks create \
              -organization-name ${{ env.TF_ORG }} \
              -project-name "${{ env.TF_PROJECT }}" \
              -stack-name "$STACK_NAME" || echo "INFO: Shell exists."

            # 5. UPLOAD (Using native CLI packaging from the stack root)
            echo "LOG: [3/3] Uploading configuration (Speculative)..."
            # We removed the -file flag as it is not supported by 'stacks configuration upload'
            terraform stacks configuration upload \
              -organization-name ${{ env.TF_ORG }} \
              -project-name "${{ env.TF_PROJECT }}" \
              -stack-name "$STACK_NAME" \
              -speculative

            # Return to repository root for next iteration
            cd - > /dev/null
            echo "SUCCESS: $STACK_NAME processed."
            echo "----------------------------------------------------------------"
          done

      - name: Success Summary
        run: |
          echo "SUCCESS: All stacks processed. Check the HCP UI for speculative plans."
