name: Stacks Upload

on:
  # workflow_run:
  #   workflows: ["Modules Upload"]
  #   types: [completed]
  workflow_dispatch:

jobs:
  deploy-stacks:
    if: ${{ github.event_name == 'workflow_dispatch' || github.event.workflow_run.conclusion == 'success' }}
    runs-on: ubuntu-latest
    permissions:
      id-token: write
      contents: read
    env:
      TF_ORG: "amiasea"
      TF_PROJECT: "amiasea"
      STACKS_ROOT: "terraform/stacks"
      TF_LOG: "DEBUG" 

    steps:
      - name: Checkout Code
        uses: actions/checkout@v4

      - name: 'Az CLI Login'
        uses: azure/login@v2
        with:
          client-id: ${{ vars.AZURE_CLIENT_ID }}
          tenant-id: ${{ vars.AZURE_TENANT_ID }}
          subscription-id: ${{ vars.AZURE_SUBSCRIPTION_ID }}

      - name: Fetch Secrets from Azure
        run: |
          echo "LOG: Fetching Terraform Token and GitHub App Private Key..."
          
          # Fetch TF Token using the versionless ID
          RAW_TOKEN=$(az keyvault secret show --id "${{ vars.TF_TOKEN_VERSIONLESS_ID }}" --query value -o tsv)
          echo "::add-mask::$RAW_TOKEN"
          echo "TF_TOKEN_app_terraform_io=$RAW_TOKEN" >> $GITHUB_ENV
          
          # Fetch GitHub App PEM Key using the versionless ID variable
          PEM_KEY=$(az keyvault secret show --id "${{ vars.AMIASEA_PRIVATE_KEY_VERSIONLESS_ID }}" --query value -o tsv)
          echo "::add-mask::$PEM_KEY"
          
          # Export as TF_VAR so the Stack Component picks it up automatically via environment injection
          # Heredoc ensures the multi-line RSA PEM structure is preserved
          echo "TF_VAR_gh_app_pem_file<<EOF" >> $GITHUB_ENV
          echo "$PEM_KEY" >> $GITHUB_ENV
          echo "EOF" >> $GITHUB_ENV

      - name: Setup Terraform
        uses: hashicorp/setup-terraform@v3
        with:
          terraform_version: "1.14.8"
          cli_config_credentials_token: ${{ env.TF_TOKEN_app_terraform_io }}

      - name: Install tfstacks CLI
        run: |
          echo "LOG: Fetching explicit tfstacks binary to bypass runner GPG validation bug..."
          curl -sSL -o tfstacks.zip https://releases.hashicorp.com/tfstacks/1.2.0/tfstacks_1.2.0_linux_amd64.zip
          unzip tfstacks.zip
          rm tfstacks.zip
          
          # Move the binary into a system path folder already present in the runner's $PATH
          sudo mv tfstacks /usr/local/bin/

      - name: Sync All Stacks from Filesystem
        run: |
          # Enable strict error-checking inside the shell environment
          set -e

          for STACK_NAME in $(find ${{ env.STACKS_ROOT }} -maxdepth 1 -mindepth 1 -type d -exec basename {} \;) ; do
            echo "################################################################"
            echo " SYNCING STACK: $STACK_NAME"
            echo "################################################################"
            
            STACK_DIR="${{ env.STACKS_ROOT }}/$STACK_NAME"
            cd "$STACK_DIR"

            echo "LOG: [1/3] Initializing & Validating..."
            terraform stacks init
            terraform stacks validate

            echo "LOG: [2/3] Ensuring Stack Shell exists..."
            terraform stacks create \
              -organization-name ${{ env.TF_ORG }} \
              -project-name "${{ env.TF_PROJECT }}" \
              -stack-name "$STACK_NAME" || echo "INFO: Shell exists."

            echo "LOG: [3/3] Uploading configuration..."
            # The TF_VAR_gh_app_pem_file is now in the environment for the upload/plan
            terraform stacks configuration upload \
              -organization-name ${{ env.TF_ORG }} \
              -project-name "${{ env.TF_PROJECT }}" \
              -stack-name "$STACK_NAME"

            cd - > /dev/null
            echo "SUCCESS: $STACK_NAME processed."
            echo "----------------------------------------------------------------"
          done

      - name: Success Summary
        run: |
          echo "SUCCESS: All stacks processed with ephemeral credentials."
