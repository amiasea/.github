name: Stacks Upload

on:
  workflow_run:
    workflows: ["Modules Upload"]
    types: [completed]
  workflow_dispatch:

jobs:
  deploy-stacks:
    if: ${{ github.event_name == 'workflow_dispatch' || github.event.workflow_run.conclusion == 'success' }}
    runs-on: ubuntu-latest
    permissions:
      id-token: write
      contents: read
    env:
      TF_ORG: "amiasea"
      TF_PROJECT: "amiasea"
      STACKS_ROOT: "terraform/stacks"
      # ENABLE DETAILED LOGGING
      TF_LOG: "DEBUG" 

    steps:
      - name: Checkout Code
        uses: actions/checkout@v4

      - name: 'Az CLI Login'
        uses: azure/login@v2
        with:
          client-id: ${{ vars.AZURE_CLIENT_ID }}
          tenant-id: ${{ vars.AZURE_TENANT_ID }}
          subscription-id: ${{ vars.AZURE_SUBSCRIPTION_ID }}

      - name: Fetch TF Token
        run: |
          RAW_TOKEN=$(az keyvault secret show --id "${{ vars.TF_TOKEN_VERSIONLESS_ID }}" --query value -o tsv)
          echo "::add-mask::$RAW_TOKEN"
          echo "TF_TOKEN_app_terraform_io=$RAW_TOKEN" >> $GITHUB_ENV

      - name: Setup Terraform
        uses: hashicorp/setup-terraform@v3
        with:
          terraform_version: "1.14.8"
          cli_config_credentials_token: ${{ env.TF_TOKEN_app_terraform_io }}

      - name: Sync All Stacks from Filesystem
        run: |
          for STACK_NAME in $(find ${{ env.STACKS_ROOT }} -maxdepth 1 -mindepth 1 -type d -exec basename {} \;) ; do
            echo "################################################################"
            echo " SYNCING STACK: $STACK_NAME"
            echo "################################################################"
            
            STACK_DIR="${{ env.STACKS_ROOT }}/$STACK_NAME"
            cd "$STACK_DIR"

            # 1. PRE-UPLOAD AUDIT
            echo "LOG: Verifying local file structure..."
            ls -R
            HCL_FILES=$(ls -1 *.hcl 2>/dev/null)
            echo "LOG: Found HCL files: $HCL_FILES"

            # 2. INIT & VALIDATE
            terraform stacks init
            terraform stacks validate

            # 3. ENSURE SHELL
            terraform stacks create \
              -organization-name ${{ env.TF_ORG }} \
              -project-name "${{ env.TF_PROJECT }}" \
              -stack-name "$STACK_NAME" || echo "INFO: Shell exists."

            # 4. MANUAL PACK & VERIFY ZIP CONTENT
            echo "LOG: Creating manual tarball for $STACK_NAME..."
            tar --exclude='.terraform' --exclude='.git' -czf ../../../stack_upload.tar.gz .
            
            echo "LOG: VERIFYING TARBALL ROOT CONTENT (MANDATORY FOR STACKS):"
            tar -tvf ../../../stack_upload.tar.gz | head -n 10

            # 5. UPLOAD WITH DEBUG LOGS
            echo "LOG: Uploading configuration version with TF_LOG=DEBUG..."
            terraform stacks configuration upload \
              -organization-name ${{ env.TF_ORG }} \
              -project-name "${{ env.TF_PROJECT }}" \
              -stack-name "$STACK_NAME" \
              -file ../../../stack_upload.tar.gz \
              -speculative

            rm ../../../stack_upload.tar.gz
            cd - > /dev/null
          done
