  packer-build-and-deploy:
    # needs: semver-chronology-guard 
    runs-on: ubuntu-latest
    permissions:
      contents: read     
      packages: write
      id-token: write
    steps:
    - name: Checkout Code
      uses: actions/checkout@v4

    - name: Setup Packer
      uses: hashicorp/setup-packer@main

    - name: Authenticate to HCP via OIDC
      uses: hashicorp/hcp-auth-action@v0
      with:
        workload_identity_provider: "iam/project/${{ vars.HCP_PROJECT_ID }}/service-principal/${{ vars.HCP_SERVICE_PRINCIPAL_NAME }}/workload-identity-provider/${{ vars.HCP_WORKLOAD_IDENTITY_PROVIDER_NAME }}"

    - name: Packer Init
      run: packer init packer/

    - name: Run Packer Build
      run: |
        SEMVER_TAG=$(echo '${{ github.ref }}' | sed 's|refs/tags/||')
        packer build \
          -var "github_actor=${{ github.actor }}" \
          -var "github_token=${{ secrets.GITHUB_TOKEN }}" \
          -var "repo_name=${{ github.event.repository.name }}" \
          -var "semver_tag=$SEMVER_TAG" \
          -var "dockerfile_path=./services/API/Amiasea.API/Dockerfile" \
          packer/template.packer.hcl
