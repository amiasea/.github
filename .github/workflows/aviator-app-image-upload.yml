name: Amiasea App Image Build (API + UI)

on:
  workflow_dispatch:
    inputs:
      registry:
        description: 'Container registry to push images to (e.g., ghcr.io)'
        required: false
        default: 'ghcr.io'
      image_namespace:
        description: 'Namespace/organization in the container registry (e.g., amiasea)'
        required: false
        default: 'amiasea'

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up QEMU and Docker Buildx
        uses: docker/setup-buildx-action@v2

      - name: Log in to registry
        uses: docker/login-action@v2
        with:
          registry: ${{ inputs.registry }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Build and push API image
        run: |
          IMAGE="${{ inputs.registry }}/${{ inputs.image_namespace }}/amiasea-api:latest"
          
          # Run build from root (.) 
          # Point to the Dockerfile path (-f)
          docker build -f Services/API/Amiasea.API/Dockerfile -t "$IMAGE" .
          
          docker push "$IMAGE"

      - name: Build and push UI image (placeholder)
        run: |
          # UI Dockerfile not present yet. Replace this block with actual UI build steps.
          echo "UI build placeholder — add Services/UI Dockerfile and build steps here."
          # Example:
          # UI_IMAGE="${{ inputs.registry }}/${{ inputs.image_namespace }}/amiasea-ui:latest"
          # docker build -f Services/UI/Dockerfile -t "$UI_IMAGE" Services/UI
          # docker push "$UI_IMAGE"